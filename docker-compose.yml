version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aaf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_db
    ports:
      - "5432:5432"
    volumes:
      - aaf_pgdata:/var/lib/postgresql/data
    networks:
      - aaf_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: aaf_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Web UI
    volumes:
      - aaf_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - aaf_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent_core:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: aaf_core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Важно: пробрасываем весь проект внутрь. 
    # Так агент сохранит память (kuzu, chroma), а логи мы сможем читать снаружи
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
    # Прокидываем .env внутрь, чтобы не копировать его в образ
    env_file:
      - .env
    networks:
      - aaf_net
    # Небольшая задержка перед стартом, чтобы скрипты успели проснуться
    command: >
      sh -c "echo 'Ожидание стабилизации RabbitMQ и Postgres.' && sleep 5 && python -m src.main"

networks:
  aaf_net:
    driver: bridge

volumes:
  aaf_pgdata:
  aaf_rabbitmq_data: