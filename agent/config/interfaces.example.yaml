# ==============================================================================
# AAF Interfaces Configuration
# ==============================================================================
# enabled - включает или отключает интерфейс целиком. Если false, агент не будет даже видеть этот интерфейс и не сможет его использовать.
# agent_account - указывает, может ли агент использовать свой аккаунт для взаимодействия с указанным интерфейсом. 
# Перед использованием интерфейса необходимо убедиться, что вы правильно настроили аккаунт агента (если требуется) и предоставили необходимые API ключи/токены доступа.

api:
  github:
    enabled: true
    agent_account: false

  habr:
    enabled: true
    agent_account: false 
    tracked_hubs:
      - "news"
      # - "python"
      # Можно добавлять свои, по умолчанию - только "news" для получения свежих статей

  reddit:
    enabled: true
    agent_account: false


# ==============================================================================
# ПРОТОКОЛЫ
# ==============================================================================

calendar: # Локальный планировщик (cron, таймеры, дедлайны)
  enabled: true

desktop: # Доступ к хост-машине ПК (отправка системных уведомлений, открытие браузера, взаимодействие с окнами)
  enabled: false 

email: # Доступ к своей личной почте (требуется аккаунт)
  enabled: false

geo: # Геокодинг, построение маршрутов, запрос погоды по координатам
  enabled: true

system: # Позволяет агенту менять свои настройки в рантайме
  enabled: true


# ==============================================================================
# TELEGRAM
# ==============================================================================

telegram:
  userbot: # Работа через Telethon от лица реального юзера
    enabled: false
    status_tag: "none" # Где отображать маркер [online]/[offline] 
    # в имени - "name", в описании профиля - "bio", не показывать - "none"

  bot: # Классический бот на Aiogram
    enabled: false


# ==============================================================================
# VIRTUAL FILE SYSTEM & SANDBOX
# ==============================================================================

vfs:
  enabled: true # Доступ к файловой системе

  # Уровни доступа агента (не рекомендуется поднимать выше 1):
  # 0 - cage      (Read/Write только внутри папки sandbox/, скрипты агент выполняются строго в Docker)
  # 1 - voyeur    (Read для всего кода проекта, Write только в sandbox/)
  # 2 - surgeon   (Read/Write файлов всего проекта - агент может переписать собственный код)
  # 3 - god_mode  (Полный доступ + скрипты могут выполняться прямо на ОС хоста)
  madness_level: 0

  # Включать только в случае крайней необходимости, так как это может привести к проблемам с безопасностью
  env_access: false # Разрешить агенту читать и изменять файл .env (может слить ключи)
  db_access: false  # Разрешить агенту ковырять файлы баз данных напрямую (может базы убить и потерять память)


# ==============================================================================
# ИНТЕРНЕТ
# ==============================================================================

web:
  browser:
    enabled: false
  http:
    enabled: true # Сырые асинхронные запросы GET/POST к любым API
  search:
    enabled: true # Поиск в Google, DuckDuckGo, Wikipedia